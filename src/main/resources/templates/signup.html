<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account • SecureAuth</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div class="container">
    <div class="auth-box signup-box">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p class="subtitle">Get started with your free account</p>
        </div>

        <form id="signupForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="username">
                        <span class="label-icon">👤</span>
                        Username
                    </label>
                    <input type="text" id="username" name="username" required
                           placeholder="Choose a username" autocomplete="username">
                    <div class="input-focus-effect"></div>
                    <div class="input-hint">Minimum 3 characters</div>
                </div>

                <div class="form-group">
                    <label for="email">
                        <span class="label-icon">📧</span>
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" required
                           placeholder="your@email.com" autocomplete="email">
                    <div class="input-focus-effect"></div>
                    <div class="input-hint">We'll send OTP to this email</div>
                </div>
            </div>

            <div class="form-group">
                <label for="password">
                    <span class="label-icon">🔒</span>
                    Password
                </label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required
                           placeholder="Create a strong password">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        👁️
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar"></div>
                    <div class="strength-text">Password strength: <span>None</span></div>
                </div>
                <div class="input-focus-effect"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">
                    <span class="label-icon">✓</span>
                    Confirm Password
                </label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                           placeholder="Confirm your password">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                        👁️
                    </button>
                </div>
                <div class="input-focus-effect"></div>
            </div>

            <div class="form-group terms-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="termsCheckbox" required>
                    <span class="checkmark"></span>
                    <span class="terms-text">
                            I agree to the <a href="#" class="terms-link">Terms of Service</a> and
                            <a href="#" class="terms-link">Privacy Policy</a>
                        </span>
                </label>
            </div>

            <button type="submit" class="btn-primary">
                <span class="btn-text">Create Account</span>
                <span class="btn-icon">🚀</span>
            </button>
        </form>

        <div id="message" class="message"></div>

        <div class="auth-footer">
            <p class="auth-link">
                Already have an account?
                <a href="/login-page">
                    <span>Sign In</span>
                    <span class="link-arrow">→</span>
                </a>
            </p>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
<script>
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
    }

    // Password strength checker
    const passwordInput = document.getElementById('password');
    if (passwordInput) {
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strength = checkPasswordStrength(password);
            updateStrengthIndicator(strength);
        });
    }

    function checkPasswordStrength(password) {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/[0-9]/)) strength++;
        if (password.match(/[^a-zA-Z0-9]/)) strength++;
        return Math.min(strength, 4);
    }

    function updateStrengthIndicator(strength) {
        const bar = document.querySelector('.strength-bar');
        const text = document.querySelector('.strength-text span');

        bar.className = 'strength-bar';
        if (strength === 0) {
            bar.style.width = '0%';
            text.textContent = 'None';
            text.style.color = '#cbd5e0';
        } else if (strength === 1) {
            bar.classList.add('weak');
            bar.style.width = '25%';
            text.textContent = 'Weak';
            text.style.color = '#f56565';
        } else if (strength === 2) {
            bar.classList.add('fair');
            bar.style.width = '50%';
            text.textContent = 'Fair';
            text.style.color = '#ed8936';
        } else if (strength === 3) {
            bar.classList.add('good');
            bar.style.width = '75%';
            text.textContent = 'Good';
            text.style.color = '#48bb78';
        } else {
            bar.classList.add('strong');
            bar.style.width = '100%';
            text.textContent = 'Strong';
            text.style.color = '#38a169';
        }
    }

    // Animated particles
    document.addEventListener('DOMContentLoaded', () => {
        const particles = document.querySelectorAll('.particle');
        particles.forEach(particle => {
            const duration = Math.random() * 20 + 10;
            const delay = Math.random() * 5;
            particle.style.animation = `float ${duration}s infinite ease-in-out ${delay}s`;
        });
    });
</script>
</body>
</html>
